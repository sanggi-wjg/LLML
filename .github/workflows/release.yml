name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: llml
            asset_name: llml-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: llml.exe
            asset_name: llml-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: llml
            asset_name: llml-macos-amd64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: llml
            asset_name: llml-macos-arm64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
        
    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }} -p llml-cli
      
    - name: Prepare asset name
      run: cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
      
    - name: Upload binaries to release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
        name: Release ${{ github.ref_name }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish all crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p llml-lexer --no-verify || true
          cargo publish -p llml-parser --no-verify || true
          cargo publish -p llml-interp --no-verify || true
          cargo publish -p llml-types --no-verify || true
          cargo publish -p llml-stdlib --no-verify || true
          cargo publish -p llml-vm --no-verify || true
          cargo publish -p llml-cli --no-verify || true
