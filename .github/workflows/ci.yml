name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p llml-cli --release
      - name: Run conformance tests
        run: |
          passed=0
          failed=0
          for llml_file in tests/conformance/*.llml; do
            base=$(basename "$llml_file" .llml)
            expected_file="tests/conformance/${base}.expected"
            [ ! -f "$expected_file" ] && continue
            actual=$(./target/release/llml run "$llml_file" 2>/dev/null)
            expected=$(cat "$expected_file")
            if [ "$actual" = "$expected" ]; then
              echo "PASS: $base"
              passed=$((passed + 1))
            else
              echo "FAIL: $base"
              echo "  expected: $(echo "$expected" | head -3)"
              echo "  actual:   $(echo "$actual" | head -3)"
              failed=$((failed + 1))
            fi
          done
          echo ""
          echo "Results: $passed passed, $failed failed"
          [ "$failed" -gt 0 ] && exit 1
          exit 0
